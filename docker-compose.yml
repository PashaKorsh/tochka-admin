services:
  postgres:
    image: postgres:15
    container_name: tochka_mod_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tochkamod
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tochka_mod_app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tochkamod
      B2B_TO_MOD_KEY: dev-service-key
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
